name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff==0.14.14

      - name: Ruff check
        run: python -m ruff check .

      - name: Ruff format
        run: python -m ruff format --check .

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Unit tests: pure modules + Opnamesessie (numpy voor audiobuffers).
          python -m pip install pytest==9.1.1 numpy==2.5.1

      - name: Run tests
        run: python -m pytest -q
